

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical AI Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      width: 400px;
      margin: 50px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .chat-header {
      background: #0077b6;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      border-radius: 8px 8px 0 0;
    }
    .chat-body {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }
    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      max-width: 80%;
    }
    .user-message {
      background: #d1f7c4;
      align-self: flex-end;
    }
    .bot-message {
      background: #e0e0e0;
      align-self: flex-start;
    }
    .chat-footer {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
    }
    .chat-footer input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .chat-footer button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #0077b6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Medical AI Chatbot</div>
    <div class="chat-body" id="chat-body">
      <!-- Messages will appear here -->
    </div>
    <div class="chat-footer">
      <input type="text" id="user-input" placeholder="Type your question...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBody = document.getElementById('chat-body');
      const userText = input.value.trim();
      if (!userText) return;

      // Display user message
      const userMsg = document.createElement('div');
      userMsg.className = 'message user-message';
      userMsg.textContent = userText;
      chatBody.appendChild(userMsg);

      // Placeholder bot response
      //const botMsg = document.createElement('div');
      //botMsg.className = 'message bot-message';
     // botMsg.textContent = "This is a placeholder response. Connect me to your backend AI model for real answers.";
     // chatBody.appendChild(botMsg);
     const botMsg = document.createElement('div');
     botMsg.className = 'message bot-message';
     botMsg.textContent = "thinking...";
     chatBody.appendChild(botMsg);

     fetch('/get',{
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'msg='+encodeURIComponent(userText)
     })
     .then(res=>res.text())
     .then(answer =>{
        botMsg.textContent = answer;
        chatBody.scrollTop = chatBody.scrollHeight;
     });

      input.value = '';
      chatBody.scrollTop = chatBody.scrollHeight;
    }
  </script>
</body>
</html>
